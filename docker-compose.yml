services:
  dbdash:
    build:
      context: .
      args:
        VITE_API_URL: ${VITE_API_URL:-https://panel2.skyecord.app}
    container_name: DBDash
    restart: unless-stopped
    env_file:
      - .env
    network_mode: host
    command: sh -c "cd /app/backend && node server.js & cd /app && node serve-frontend.js"
